name: 应用驾驶舱 Migration

# 部署顺序（绑定，自上而下）：
#   1. 20260710_cockpit_ledger_and_fx_rates.sql
#   1b. 20260718_etf_pool_authenticated_read.sql（补 etf_pool RLS/GRANT；幂等）
#   1c. 20260718_index_market_anon_read.sql（补指数仪表盘共享表公开读；幂等）
#   2. 20260715_rename_etf_pool_snapshots_to_etf_pool.sql（独立步骤，幂等）
#   3. 20260719_rename_etf_valuation_to_index_valuation.sql（独立步骤，幂等）
#   4. 清理 migrations（drop amount 列 + drop trade_calendar；独立步骤）
#   5. 20260721_drop_fx_rates.sql（独立步骤，幂等；下线汇率表）
#
# Live 部署边界：
#   - 须受控生产窗口 + 明确人工授权后手动触发本 workflow；代码合并 ≠ 已部署。
#   - rename / cleanup / drop_fx 均须分批执行（多选由 Guard 步骤硬失败）。

on:
  workflow_dispatch:
    inputs:
      apply_rename_migration:
        description: "执行 etf_pool_snapshots → etf_pool rename（须单独授权；不得与 cleanup 同批）"
        required: true
        type: boolean
        default: false
      apply_cleanup_migration:
        description: "删除 etf_daily amount 列 + trade_calendar 表（须单独授权）"
        required: true
        type: boolean
        default: false
      apply_index_valuation_rename_migration:
        description: "执行 etf_valuation → index_valuation rename（须单独授权）"
        required: true
        type: boolean
        default: false
      apply_drop_fx_rates_migration:
        description: "删除 fx_rates 表（须单独授权）"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Guard mutually exclusive migration flags
        env:
          APPLY_RENAME: ${{ inputs.apply_rename_migration }}
          APPLY_CLEANUP: ${{ inputs.apply_cleanup_migration }}
          APPLY_INDEX_VALUATION_RENAME: ${{ inputs.apply_index_valuation_rename_migration }}
          APPLY_DROP_FX: ${{ inputs.apply_drop_fx_rates_migration }}
        run: |
          set -euo pipefail
          selected=0
          for flag in "$APPLY_RENAME" "$APPLY_CLEANUP" "$APPLY_INDEX_VALUATION_RENAME" "$APPLY_DROP_FX"; do
            if [ "$flag" = "true" ]; then
              selected=$((selected + 1))
            fi
          done
          if [ "$selected" -gt 1 ]; then
            echo "::error::rename / cleanup / drop_fx migration 互斥，须分次 workflow run 单独授权，不得同批勾选"
            exit 1
          fi

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Validate DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing required GitHub Secret: DATABASE_URL"
            exit 1
          fi

      - name: Apply cockpit ledger migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260710_cockpit_ledger_and_fx_rates.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260718_etf_pool_authenticated_read.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260718_index_market_anon_read.sql
          echo "cockpit ledger + shared market read migrations applied"

      - name: Verify cockpit ledger tables exist
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            select tablename
            from pg_tables
            where schemaname = 'public'
              and tablename in (
                'portfolio_settings', 'target_allocations', 'etf_instruments', 'positions',
                'trade_records', 'cash_flows', 'cash_accounts', 'rebalance_plans',
                'grid_plans', 'review_entries', 'decision_logs', 'portfolio'
              )
            order by tablename;
          "

      - name: Apply etf_pool rename migration
        if: inputs.apply_rename_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "Applying etf_pool_snapshots → etf_pool rename (standalone)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260715_rename_etf_pool_snapshots_to_etf_pool.sql
          echo "etf_pool rename migration applied"

      - name: Verify etf_pool rename (readonly)
        if: inputs.apply_rename_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          result="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "
            select coalesce(to_regclass('public.etf_pool')::text, ''),
                   coalesce(to_regclass('public.etf_pool_snapshots')::text, '');
          ")"
          etf_pool="$(echo "$result" | cut -d'|' -f1)"
          legacy="$(echo "$result" | cut -d'|' -f2)"
          echo "to_regclass public.etf_pool = ${etf_pool:-<null>}"
          echo "to_regclass public.etf_pool_snapshots = ${legacy:-<null>}"
          if [ -z "$etf_pool" ]; then
            echo "::error::Expected public.etf_pool to exist after rename; got '${etf_pool:-<null>}'"
            exit 1
          fi
          if [ -n "$legacy" ]; then
            echo "::error::Legacy table public.etf_pool_snapshots still exists; rename incomplete"
            exit 1
          fi
          pool_count="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from public.etf_pool;")"
          echo "etf_pool row count: $pool_count"
          if [ "$pool_count" -lt 1 ]; then
            echo "::error::public.etf_pool is empty"
            exit 1
          fi
          echo "etf_pool rename verification passed"

      - name: Apply index_valuation rename migration
        if: inputs.apply_index_valuation_rename_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "Applying etf_valuation → index_valuation rename (standalone)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260719_rename_etf_valuation_to_index_valuation.sql
          echo "index_valuation rename migration applied"

      - name: Verify index_valuation rename (readonly)
        if: inputs.apply_index_valuation_rename_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          current="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select coalesce(to_regclass('public.index_valuation')::text, '');")"
          legacy="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select coalesce(to_regclass('public.etf_valuation')::text, '');")"
          row_count="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from public.index_valuation;")"
          pkey="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from pg_constraint where conrelid='public.index_valuation'::regclass and conname='index_valuation_pkey';")"
          policies="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from pg_policy where polrelid='public.index_valuation'::regclass and polname in ('index_valuation_select_anon','index_valuation_select_authenticated');")"
          if [ "$current" != "index_valuation" ] || [ -n "$legacy" ] || [ "$row_count" -lt 1 ] || [ "$pkey" -ne 1 ] || [ "$policies" -ne 2 ]; then
            echo "::error::index_valuation verification failed: current='$current' legacy='$legacy' rows='$row_count' pkey='$pkey' policies='$policies'"
            exit 1
          fi
          echo "index_valuation rename verification passed: rows=$row_count"

      - name: Apply cleanup migrations (amount columns + trade_calendar)
        if: inputs.apply_cleanup_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260717_drop_etf_daily_amount_columns.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260717_drop_trade_calendar.sql
          echo "cleanup migrations applied"

      - name: Verify cleanup (readonly)
        if: inputs.apply_cleanup_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          cols="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "
            select coalesce(string_agg(column_name, ',' order by column_name), '')
            from information_schema.columns
            where table_schema='public' and table_name='etf_daily'
              and column_name in ('amount','amount_source','amount_updated_at');
          ")"
          if [ -n "$cols" ]; then
            echo "::error::expected amount columns dropped; got '$cols'"
            exit 1
          fi
          cal="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select coalesce(to_regclass('public.trade_calendar')::text, '');")"
          if [ -n "$cal" ]; then
            echo "::error::public.trade_calendar still exists"
            exit 1
          fi
          echo "cleanup verification passed"

      - name: Apply drop fx_rates migration
        if: inputs.apply_drop_fx_rates_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "Dropping public.fx_rates (standalone)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -f src/scheduled_tasks/models/migrations/20260721_drop_fx_rates.sql
          echo "drop fx_rates migration applied"

      - name: Verify fx_rates dropped (readonly)
        if: inputs.apply_drop_fx_rates_migration == true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          fx="$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select coalesce(to_regclass('public.fx_rates')::text, '');")"
          if [ -n "$fx" ]; then
            echo "::error::public.fx_rates still exists"
            exit 1
          fi
          echo "fx_rates drop verification passed"
