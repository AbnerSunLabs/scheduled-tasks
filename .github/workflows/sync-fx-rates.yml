name: 同步汇率到 Supabase

on:
  schedule:
    # 工作日北京时间约 23:30（ECB 约 16:00 CET 已发布）
    - cron: "30 15 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "同步模式"
        required: true
        type: choice
        options:
          - incremental
          - full
        default: incremental
      lookback_days:
        description: "incremental 回看天数"
        required: false
        type: string
        default: "7"
      start:
        description: "可选起始日 YYYY-MM-DD"
        required: false
        type: string
      end:
        description: "可选结束日 YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync-fx:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: sync-fx-rates
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate required configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing required GitHub Secret: DATABASE_URL"
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync FX rates
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_MODE: ${{ steps.mode.outputs.mode }}
          INPUT_LOOKBACK: ${{ inputs.lookback_days }}
          INPUT_START: ${{ inputs.start }}
          INPUT_END: ${{ inputs.end }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          args=(--mode="$SYNC_MODE")
          if [ -n "${INPUT_LOOKBACK:-}" ]; then
            args+=(--lookback-days="$INPUT_LOOKBACK")
          fi
          if [ -n "${INPUT_START:-}" ]; then
            args+=(--start="$INPUT_START")
          fi
          if [ -n "${INPUT_END:-}" ]; then
            args+=(--end="$INPUT_END")
          fi
          python -m scheduled_tasks.jobs.sync_fx_rates_frankfurter "${args[@]}"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-fx-summary
          path: artifacts/sync_fx_rates_summary.json
          if-no-files-found: warn

  notify-bark:
    needs: sync-fx
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sync-fx-summary
          path: artifacts

      - name: Push Bark notification
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          JOB_RESULT: ${{ needs.sync-fx.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${BARK_KEY:-}" ]; then
            echo "::warning::BARK_KEY not configured; skip Bark notify"
            exit 0
          fi

          summary_file="artifacts/sync_fx_rates_summary.json"
          if [ -f "$summary_file" ]; then
            eval "$(python - <<'PY'
          import json
          d = json.load(open("artifacts/sync_fx_rates_summary.json", encoding="utf-8"))
          def esc(v):
              return str(v).replace("'", "'\\''")
          print(f"mode='{esc(d.get('mode',''))}'")
          print(f"status='{esc(d.get('status',''))}'")
          print(f"success_count='{esc(d.get('success_count',0))}'")
          print(f"failure_count='{esc(d.get('failure_count',0))}'")
          print(f"upserted_rows='{esc(d.get('upserted_rows',0))}'")
          print(f"max_rate_date='{esc(d.get('max_rate_date') or '-')}'")
          PY
          )"
            case "$status" in
              success) title="汇率同步成功" ;;
              partial) title="汇率同步部分成功" ;;
              *) title="汇率同步失败" ;;
            esac
            body="job=sync_fx_rates_frankfurter mode=${mode} status=${status} days=${success_count} fail=${failure_count} rows=${upserted_rows} max_date=${max_rate_date}
          ${RUN_URL}"
          else
            case "$JOB_RESULT" in
              success) title="汇率同步成功" ;;
              cancelled) title="汇率同步取消" ;;
              *) title="汇率同步失败" ;;
            esac
            body="job=sync_fx_rates_frankfurter result=${JOB_RESULT} summary missing
          ${RUN_URL}"
          fi

          export BARK_TITLE="$title"
          export BARK_BODY="$body"
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "device_key": os.environ["BARK_KEY"],
              "title": os.environ["BARK_TITLE"],
              "body": os.environ["BARK_BODY"],
              "group": "scheduled-tasks",
          }
          req = urllib.request.Request(
              "https://api.day.app/push",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY
