name: 官网双源校验（ETF）

on:
  schedule:
    # 工作日北京时间约 20:00（ETF 日 K 同步之后）
    - cron: "0 12 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "校验窗口"
        required: true
        type: choice
        options:
          - incremental
          - full
        default: incremental
      from_pool:
        description: "校验 etf_pool 内全部沪市 ETF（深市跳过）"
        required: false
        type: boolean
        default: true
      etf_code:
        description: "单标的模式时的 ETF 代码（from_pool=false 时生效）"
        required: false
        type: string
        default: "512170"
      lookback_bars:
        description: "incremental 回看根数"
        required: false
        type: string
        default: "30"

permissions:
  contents: read

jobs:
  official-cross-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sync-official-cross-check
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate required configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing required GitHub Secret: DATABASE_URL"
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Determine args
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "from_pool=${{ inputs.from_pool }}" >> "$GITHUB_OUTPUT"
            echo "etf_code=${{ inputs.etf_code }}" >> "$GITHUB_OUTPUT"
            echo "lookback_bars=${{ inputs.lookback_bars }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
            echo "from_pool=true" >> "$GITHUB_OUTPUT"
            echo "etf_code=512170" >> "$GITHUB_OUTPUT"
            echo "lookback_bars=30" >> "$GITHUB_OUTPUT"
          fi

      - name: Official cross-check (compare-only)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_MODE: ${{ steps.args.outputs.mode }}
          FROM_POOL: ${{ steps.args.outputs.from_pool }}
          ETF_CODE: ${{ steps.args.outputs.etf_code }}
          LOOKBACK_BARS: ${{ steps.args.outputs.lookback_bars }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          args=(--mode="$SYNC_MODE" --lookback-bars="$LOOKBACK_BARS")
          if [ "${FROM_POOL}" = "true" ]; then
            args+=(--from-pool)
          else
            args+=(--etf-code="$ETF_CODE" --skip-index)
          fi
          # 定时/手动默认只比对，绝不自动 --apply-official
          python -m scheduled_tasks.jobs.sync_official_cross_check "${args[@]}"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-official-cross-check-summary
          path: artifacts/sync_official_cross_check_summary.json
          if-no-files-found: warn

  notify-bark:
    needs: official-cross-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sync-official-cross-check-summary
          path: artifacts

      - name: Push Bark notification
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          JOB_RESULT: ${{ needs.official-cross-check.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${BARK_KEY:-}" ]; then
            echo "::warning::BARK_KEY not configured; skip Bark notify"
            exit 0
          fi

          summary_file="artifacts/sync_official_cross_check_summary.json"
          if [ -f "$summary_file" ]; then
            eval "$(python - <<'PY'
          import json
          d = json.load(open("artifacts/sync_official_cross_check_summary.json", encoding="utf-8"))
          def esc(v):
              return str(v).replace("'", "'\\''")
          print(f"status='{esc(d.get('status',''))}'")
          print(f"etf_checked='{esc(len(d.get('etf_codes_checked') or []))}'")
          print(f"etf_mismatch='{esc(d.get('etf_mismatch_count',0))}'")
          print(f"etf_validated='{esc(d.get('etf_validated',0))}'")
          print(f"skipped_szse='{esc(len(d.get('etf_codes_skipped_szse') or []))}'")
          print(f"from_pool='{esc(d.get('from_pool', False))}'")
          PY
          )"
            case "$status" in
              success) title="官网校验通过" ;;
              partial) title="官网校验发现差异" ;;
              *) title="官网校验失败" ;;
            esac
            body="job=sync_official_cross_check status=${status} from_pool=${from_pool} checked=${etf_checked} validated=${etf_validated} mismatch=${etf_mismatch} skipped_szse=${skipped_szse}
          ${RUN_URL}"
          else
            case "$JOB_RESULT" in
              success) title="官网校验通过" ;;
              cancelled) title="官网校验取消" ;;
              *) title="官网校验失败" ;;
            esac
            body="job=sync_official_cross_check result=${JOB_RESULT} summary missing
          ${RUN_URL}"
          fi

          export BARK_TITLE="$title"
          export BARK_BODY="$body"
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "device_key": os.environ["BARK_KEY"],
              "title": os.environ["BARK_TITLE"],
              "body": os.environ["BARK_BODY"],
              "group": "scheduled-tasks",
          }
          req = urllib.request.Request(
              "https://api.day.app/push",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY
