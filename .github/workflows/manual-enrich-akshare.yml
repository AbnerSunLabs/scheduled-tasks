name: 手动国内补数试跑

# 临时入口：用 GitHub Secret DATABASE_URL 在 runner 上试跑。
# 海外 runner 访问东财可能不稳定；正式调度仍应在国内 Hermes。

on:
  workflow_dispatch:
    inputs:
      job:
        description: "enrich_incremental | enrich_full | trade_calendar"
        required: true
        type: choice
        options:
          - enrich_incremental
          - enrich_full
          - trade_calendar
      codes:
        description: "可选，逗号分隔 6 位码；空=全池"
        required: false
        type: string
        default: ""
      calendar_start:
        description: "日历起始 YYYY-MM-DD"
        required: false
        type: string
        default: "2020-01-01"
      calendar_end:
        description: "日历结束 YYYY-MM-DD"
        required: false
        type: string
        default: "2026-12-31"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + domestic deps
        run: |
          python -m pip install -U pip
          pip install -e '.[domestic]'

      - name: Run selected job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: src
        run: |
          set -euo pipefail
          case "${{ inputs.job }}" in
            enrich_incremental)
              if [ -n "${{ inputs.codes }}" ]; then
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=incremental --codes="${{ inputs.codes }}"
              else
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=incremental
              fi
              ;;
            enrich_full)
              if [ -n "${{ inputs.codes }}" ]; then
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=full --codes="${{ inputs.codes }}"
              else
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=full
              fi
              ;;
            trade_calendar)
              python -m scheduled_tasks.jobs.sync_trade_calendar_baostock \
                --start="${{ inputs.calendar_start }}" \
                --end="${{ inputs.calendar_end }}"
              ;;
            *)
              echo "unknown job"; exit 1
              ;;
          esac

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrich-summary
          path: artifacts/
          if-no-files-found: ignore
