name: 手动国内补数试跑

# 临时入口：用 GitHub Secret DATABASE_URL 在 runner 上试跑。
# 海外 runner 访问东财可能不稳定；正式调度仍应在国内 Hermes。

on:
  workflow_dispatch:
    inputs:
      job:
        description: "enrich_incremental | enrich_full | trade_calendar"
        required: true
        type: choice
        options:
          - enrich_incremental
          - enrich_full
          - trade_calendar
      codes:
        description: "可选，逗号分隔 6 位码；空=全池"
        required: false
        type: string
        default: ""
      calendar_start:
        description: "日历起始 YYYY-MM-DD"
        required: false
        type: string
        default: "2020-01-01"
      calendar_end:
        description: "日历结束 YYYY-MM-DD"
        required: false
        type: string
        default: "2026-12-31"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + domestic deps
        run: |
          python -m pip install -U pip
          pip install -e '.[domestic]'

      - name: Run selected job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: src
          # 经 env 传入，禁止 ${{ inputs.* }} 直接展开进 Bash（防 Shell 注入泄露 DATABASE_URL）
          INPUT_JOB: ${{ inputs.job }}
          INPUT_CODES: ${{ inputs.codes }}
          INPUT_CALENDAR_START: ${{ inputs.calendar_start }}
          INPUT_CALENDAR_END: ${{ inputs.calendar_end }}
        run: |
          set -euo pipefail
          validate_codes() {
            if [ -n "${INPUT_CODES:-}" ] && ! [[ "$INPUT_CODES" =~ ^[0-9]{6}(,[0-9]{6})*$ ]]; then
              echo "::error::codes 须为逗号分隔的 6 位数字代码，如 510300,159915"
              exit 1
            fi
          }
          case "$INPUT_JOB" in
            enrich_incremental)
              validate_codes
              if [ -n "${INPUT_CODES:-}" ]; then
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare \
                  --mode=incremental --codes="$INPUT_CODES"
              else
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=incremental
              fi
              ;;
            enrich_full)
              validate_codes
              if [ -n "${INPUT_CODES:-}" ]; then
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare \
                  --mode=full --codes="$INPUT_CODES"
              else
                python -m scheduled_tasks.jobs.sync_etf_enrich_akshare --mode=full
              fi
              ;;
            trade_calendar)
              if ! [[ "$INPUT_CALENDAR_START" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                echo "::error::calendar_start 须为 YYYY-MM-DD"
                exit 1
              fi
              if ! [[ "$INPUT_CALENDAR_END" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                echo "::error::calendar_end 须为 YYYY-MM-DD"
                exit 1
              fi
              python -m scheduled_tasks.jobs.sync_trade_calendar_baostock \
                --start="$INPUT_CALENDAR_START" \
                --end="$INPUT_CALENDAR_END"
              ;;
            *)
              echo "::error::unknown job: $INPUT_JOB"
              exit 1
              ;;
          esac

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrich-summary
          path: artifacts/
          if-no-files-found: ignore
