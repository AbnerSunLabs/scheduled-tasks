name: 同步指数估值到 Supabase

on:
  schedule:
    # 工作日北京时间约 19:15（ETF 日 K 之后）
    - cron: "15 11 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "同步模式"
        required: true
        type: choice
        options:
          - valuation-only
          - incremental
          - full
        default: valuation-only
      etf_code:
        description: "ETF 代码"
        required: false
        type: string
        default: "510300"
      index_code:
        description: "指数代码"
        required: false
        type: string
        default: "000300.SH"

permissions:
  contents: read

jobs:
  sync-index-valuation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: sync-index-valuation
      cancel-in-progress: false
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      is_trading_day: ${{ steps.gate.outputs.is_trading_day }}
      cal_date: ${{ steps.gate.outputs.cal_date }}
      calendar_error: ${{ steps.gate.outputs.error }}
      calendar_source: ${{ steps.gate.outputs.source }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate required configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing required GitHub Secret: DATABASE_URL"
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "etf_code=${{ inputs.etf_code }}" >> "$GITHUB_OUTPUT"
            echo "index_code=${{ inputs.index_code }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=valuation-only" >> "$GITHUB_OUTPUT"
            echo "etf_code=510300" >> "$GITHUB_OUTPUT"
            echo "index_code=000300.SH" >> "$GITHUB_OUTPUT"
          fi

      - name: Check A-share trading day
        id: gate
        uses: ./.github/actions/check-ashare-trading-day
        with:
          enabled: ${{ github.event_name == 'schedule' }}

      - name: Sync index valuation
        if: steps.gate.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_MODE: ${{ steps.mode.outputs.mode }}
          ETF_CODE: ${{ steps.mode.outputs.etf_code }}
          INDEX_CODE: ${{ steps.mode.outputs.index_code }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python -m scheduled_tasks.jobs.sync_hongsehuojian_fill_validate \
            --mode="$SYNC_MODE" \
            --etf-code="$ETF_CODE" \
            --index-code="$INDEX_CODE"

      - name: Upload summary artifact
        if: always() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sync-index-valuation-summary
          path: artifacts/sync_hongsehuojian_fill_validate_summary.json
          if-no-files-found: warn

  notify-bark:
    needs: sync-index-valuation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        if: needs.sync-index-valuation.outputs.should_run == 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sync-index-valuation-summary
          path: artifacts

      - name: Push Bark notification
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          JOB_RESULT: ${{ needs.sync-index-valuation.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IS_TRADING_DAY: ${{ needs.sync-index-valuation.outputs.is_trading_day }}
          CAL_DATE: ${{ needs.sync-index-valuation.outputs.cal_date }}
          CALENDAR_ERROR: ${{ needs.sync-index-valuation.outputs.calendar_error }}
          CALENDAR_SOURCE: ${{ needs.sync-index-valuation.outputs.calendar_source }}
        run: |
          set -euo pipefail
          if [ -z "${BARK_KEY:-}" ]; then
            echo "::warning::BARK_KEY not configured; skip Bark notify"
            exit 0
          fi

          # 休市静默：法定假不推「已跳过」；仅 unknown 保留告警
          if [ "${IS_TRADING_DAY:-}" = "false" ]; then
            echo "休市跳过，Bark 静默 cal_date=${CAL_DATE:-?} source=${CALENDAR_SOURCE:-?}"
            exit 0
          fi

          summary_file="artifacts/sync_hongsehuojian_fill_validate_summary.json"
          cal_warn=""
          if [ "${IS_TRADING_DAY:-}" = "unknown" ]; then
            cal_warn="【交易日历查询失败，已按交易日继续跑 error=${CALENDAR_ERROR:-?}】 "
          fi
          if [ -f "$summary_file" ]; then
            eval "$(python - <<'PY'
          import json
          d = json.load(open("artifacts/sync_hongsehuojian_fill_validate_summary.json", encoding="utf-8"))
          def esc(v):
              return str(v).replace("'", "'\\''")
          print(f"status='{esc(d.get('status',''))}'")
          print(f"index_code='{esc(d.get('index_code',''))}'")
          print(f"valuation_trade_date='{esc(d.get('valuation_trade_date') or '-')}'")
          print(f"valuation_current_pe_ttm='{esc(d.get('valuation_current_pe_ttm') or '-')}'")
          print(f"index_metric_rows='{esc(d.get('index_metric_rows',0))}'")
          PY
          )"
            case "$status" in
              success) title="指数估值同步成功" ;;
              partial) title="指数估值同步部分成功" ;;
              *) title="指数估值同步失败" ;;
            esac
            body="${cal_warn}job=sync_hongsehuojian_fill_validate index=${index_code} status=${status} trade_date=${valuation_trade_date} pe=${valuation_current_pe_ttm} metric_rows=${index_metric_rows}
          ${RUN_URL}"
          else
            case "$JOB_RESULT" in
              success) title="指数估值同步成功" ;;
              cancelled) title="指数估值同步取消" ;;
              *) title="指数估值同步失败" ;;
            esac
            body="${cal_warn}job=sync_hongsehuojian_fill_validate result=${JOB_RESULT} summary missing
          ${RUN_URL}"
          fi

          export BARK_TITLE="$title"
          export BARK_BODY="$body"
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "device_key": os.environ["BARK_KEY"],
              "title": os.environ["BARK_TITLE"],
              "body": os.environ["BARK_BODY"],
              "group": "scheduled-tasks",
          }
          req = urllib.request.Request(
              "https://api.day.app/push",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY
